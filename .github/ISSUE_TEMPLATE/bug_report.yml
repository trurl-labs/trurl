name: Bug report
description: Report incorrect behavior in Trurlic
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **If this is a security vulnerability, do NOT open an issue.**
        Use [Private Vulnerability Reporting](https://github.com/trurlic-labs/trurlic/security/advisories/new) instead.

  - type: input
    id: version
    attributes:
      label: Trurlic version
      description: Output of `trurlic --version`.
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: Rust version
      description: Output of `rustc --version` (if building from source).
      placeholder: "rustc 1.88.0"

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - install.sh (pre-built binary)
        - cargo install
        - Built from source
        - GitHub Release download
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - CLI (init, add, remove, rename, decide)
        - Design conversations (trurlic design)
        - Bootstrap (trurlic bootstrap)
        - MCP server (trurlic serve)
        - Map / visualization (trurlic map)
        - Decision store (.trurlic/ format)
        - Workflow engine
        - Configuration / API keys
        - Install script
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux x86_64
        - Linux aarch64
        - macOS Apple Silicon (aarch64)
        - macOS Intel (x86_64)
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened
      description: Clear description of the bug. Include logs (redact API keys) if relevant.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Run `trurlic init`
        2. Run `trurlic add component auth`
        3. Run ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
