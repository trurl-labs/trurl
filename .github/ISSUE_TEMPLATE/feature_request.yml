name: Feature request
description: Propose a new capability or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do that Trurlic doesn't support today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you'd expect this to work. Include CLI surface, MCP tool changes, or behavior changes if you have something in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they're worse.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - CLI
        - Design conversations
        - Bootstrap
        - MCP server / tools
        - Map / visualization
        - Decision store / graph format
        - Workflow engine
        - Configuration
        - Install script
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: breaking
    attributes:
      label: Breaking change
      options:
        - label: This would change the `.trurlic/` format, MCP tool surface, or CLI interface
