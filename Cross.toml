# Cross-compilation configuration.
#
# The release workflow strips .cargo/config.toml linker overrides before
# invoking cross, so the default GCC cross-toolchain is used as-is.
#
# Image override: cross 0.2.5's default aarch64 image ships Ubuntu 16.04
# (glibc 2.23), which lacks memfd_create (added in glibc 2.27). The :main
# image ships Ubuntu 20.04 (glibc 2.31).
[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:main"
