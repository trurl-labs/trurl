<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>trurl map</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <canvas id="minimap" width="360" height="240"></canvas>
    <!-- Search overlay -->
    <div id="search-bar" class="search-bar hidden">
      <input
        id="search-input"
        type="text"
        placeholder="Search components, decisions, patterns…"
        autocomplete="off"
        spellcheck="false"
      />
      <div id="search-results" class="search-results"></div>
    </div>
    <div id="panel"></div>
    <!-- ARIA live region: announces selected node for screen readers. -->
    <div id="aria-live" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    <script src="app.js"></script>
  </body>
</html>
